name: Deppy Verification

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  verify:
    runs-on: ubuntu-latest
    name: Deppy Tests
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      
      - name: Install dependencies
        run: |
          pip install z3-solver>=4.12 pytest>=7.0 pytest-timeout>=2.0
      
      - name: Run deppy tests
        run: |
          PYTHONPATH=. python -m pytest deppy/tests/ -v --timeout=60
      
      - name: Run Lean discharge tests
        run: |
          PYTHONPATH=. python -m pytest deppy/lean/ -v --timeout=60
      
      - name: Parse check all deppy modules
        run: |
          python -c "
          import ast, sys, pathlib
          errors = []
          total = 0
          for f in sorted(pathlib.Path('deppy').rglob('*.py')):
              if f.name == '__init__.py':
                  continue
              try:
                  ast.parse(f.read_text())
                  lines = f.read_text().count(chr(10)) + 1
                  total += lines
              except SyntaxError as e:
                  errors.append(f'{f}: {e}')
                  print(f'  ❌ {f}: {e}')
          print(f'Checked {total} lines across deppy/')
          if errors:
              print(f'FAILED: {len(errors)} files have syntax errors')
              sys.exit(1)
          else:
              print('All modules parse OK')
          "
