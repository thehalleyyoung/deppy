name: deppy Hybrid Type Verification

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  verify:
    runs-on: ubuntu-latest
    name: Hybrid Type Verification
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      
      - name: Install dependencies
        run: |
          pip install z3-solver>=4.12 pytest>=7.0 pytest-timeout>=2.0
          pip install -e . || true  # Install deppy if possible
      
      - name: Run hybrid type tests
        run: |
          PYTHONPATH=src python -m pytest tests/test_hybrid/ -v --timeout=60
      
      - name: Parse check all hybrid modules
        run: |
          PYTHONPATH=src python -c "
          import ast, sys, pathlib
          errors = []
          total = 0
          for f in sorted(pathlib.Path('src/deppy/hybrid').rglob('*.py')):
              if f.name == '__init__.py':
                  continue
              try:
                  ast.parse(f.read_text())
                  lines = f.read_text().count(chr(10)) + 1
                  total += lines
                  print(f'  ✅ {f}: {lines} lines')
              except SyntaxError as e:
                  errors.append(f'{f}: {e}')
                  print(f'  ❌ {f}: {e}')
          print(f'Total: {total} lines')
          if errors:
              print(f'FAILED: {len(errors)} files have syntax errors')
              sys.exit(1)
          "
      
      - name: Parse check agent modules
        run: |
          python -c "
          import ast, sys, pathlib
          errors = []
          for f in sorted(pathlib.Path('agent').rglob('*.py')):
              if f.name == '__init__.py':
                  continue
              try:
                  ast.parse(f.read_text())
                  print(f'  ✅ {f}')
              except SyntaxError as e:
                  errors.append(f'{f}: {e}')
                  print(f'  ❌ {f}: {e}')
          if errors:
              sys.exit(1)
          "
